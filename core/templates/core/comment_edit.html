{% extends "core/base.html" %}
{% block content%}
<div class="container mt-4" style="max-width: 600px;">
    <h3>Edit Comment</h3>
    <p class="text=muted small">On ticket: <a href="{% url 'core:ticket_detail' comment.ticket.pk %}">{{ comment.ticket.title }}</a></p>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <div class="mb-3"
                <label class="form-label">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div class="text-danger small">{{ field.errors|striptags }</div>}
                {% endif %}
            </div>  
        {% endfor %}
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{% url 'core:ticket_detail' comment.ticket.pk %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock content %}
