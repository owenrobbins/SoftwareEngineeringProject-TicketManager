{% extends "core/base.html" %}
{% block content %}
<div class="container mt-4" style="max-width: 500px;">
    <h3>Delete User</h3>
    <p>Are you sure you want to delete <strong>{{ profile_user.username }}</strong>?</p>
    <p class="text-danger small">This cannot be undone. </p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Confirm Delete</button>
        <a href="{% url 'core:profile_view' profile_user.pk %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock content %}
