{% extends "core/base.html" %}
{% block content %}
<div class="container mt-4" style="max-width: 500px">
    <h3>Edit Profile - {{ profile_user.username }}</h3>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <div class="mb-3">
                <label class="form-label">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div class="text-danger small">{{ field.errors|striptags }}</div>
                {% endif %}
            </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{% url 'core:profile_view' profile_user.pk %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock content %}
