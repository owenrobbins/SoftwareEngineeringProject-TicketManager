{% extends 'core/base.html'%}
{% block content %}

<!-- Entry point for any users who aren't logged in 
    Logged in users get redirected away from this page and directed to core/home

    Uses CSS Styling to make the page more unique
    CSS learning content: https://www.w3schools.com/css/
    CSS reference guide: https://cssreference.io/
-->
<style>
    
    /* flex outer wrapper that aligns items and centers */
    .landing-wrap {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
    }

    .landing-card {
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 3rem 3.5rem;
        max-width: 480px;
        width: 100%;
        box-shadow: 0 4px 6px -1px
    }

    .landing-logo {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 2.4rem;
        font-weight: 700;
        color: #0f172a;
        letter-spacing: -0.03rem;
        margin-bottom: 0.25rem;
    }

    .landing-logo span {
        color: #2563eb;
    }

    .landing-tagline {
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        font-size: 0.95rem;
        color: #64748b;
        margin-bottom: 2.5rem;
        font-weight: 400;
    }

    .landing-divider {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin: 1.5rem 0;
        color: #94a3b8;
        font-size: 0.8rem;
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }

    /*::before and ::after insert content either side of the "or" without needing any extra html*/
    .landing-divider::before,
    .landing-divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: #e2e8f0
    }

    .btn-landing-primary {
        display: block;
        width: 100%;
        padding: 0.75rem 1.5rem;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 8px;
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        font-size: 0.95rem;
        font-weight: 500;
        text-decoration: none;
        transition: background 0.15s ease, transform 0.1s ease;
        margin-bottom: 0.75rem;
    }

    .btn-landing-primary:hover {
        background: #1d4ed8;
        color: white;
        transform: translateY(-1px);
    }

    .btn-landing-secondary {
        display: block;
        width: 100%;
        padding: 0.75rem 1.5rem;
        background: white;
        color: #0f172a;
        border: 1.5px solid #e2e8f0;
        border-radius: 8px;
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        font-size: 0.95rem;
        font-weight: 500;
        text-decoration: none;
        transition: border-color 0.15s ease, transform 0.1s ease;
    }

    .btn-landing-secondary:hover{
        border-color: #2563eb;
        color: #2563eb;
        transform: translateY(-1px);
    }

    .landing-features{
        display: flex;
        justify-content: center;
        gap: 1.5rem;
        margin-top: 2.5rem;
        padding-top: 2rem;
        border-top: 1px solid #f1f5f9;
        flex-wrap: wrap;
    }

    .feature-pill{
        font-family: 'Inter', sans-serif;
        font-size: 0.78rem;
        color: #64748b;
        display: flex;
        align-items: center;
        gap: 0.3rem;
    }

    .feature-pill::before{
        content: '✓';
        color: #2563eb;
        font-weight: 600;
    }
</style>

<div class="landing-wrap">
    <div class="landing-card">

        <div class="landing-logo">Ticket<span>Lite</span></div>
        <p class="landing-tagline">Simple, focused ticket tracking for your team.</p>

        <a href="{% url 'core:login' %}"class="btn-landing-primary">Sign In</a>

        <div class="landing-divider">or</div>

        <a href="{% url 'core:register' %}"class="btn-landing-secondary">Create An Account</a>

        <div class="landing-features">
            <span class="feature-pill">Track Tickets</span>
            <span class="feature-pill">Manage Projects</span>
            <span class="feature-pill">Team Comments</span>
        </div>

    </div>
</div>

{% endblock  %}
